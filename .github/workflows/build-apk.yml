name: Build PicoZen APK (DISABLED)

# This workflow is intentionally disabled.
# The primary Android build and release process is handled by .github/workflows/android.yml.
# To re-enable, uncomment the 'on:' section below.
# on:
#   push:
#     branches: [ main ]
#   workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Build APK
      run: ./gradlew assembleRelease --no-daemon
      
    - name: List APK files
      run: find . -name "*.apk" -type f
      
    - name: Create Release (DISABLED)
      run: echo "Release creation is disabled in this workflow. Use android.yml."
        
    - name: Upload APK to Release (DISABLED)
      run: echo "APK upload to release is disabled in this workflow. Use android.yml."
