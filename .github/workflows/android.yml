name: Android CI

on:
  push:
    branches: [ "main" ] # Only trigger on push to main branch for releases
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allow manual trigger

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Create Android signing key from secret
      run: |
        sed -i 's|C:\\Users\\Username\\|../|g' build.gradle
        echo -n "${{ secrets.ANDROID_SIGNING_KEY }}" | base64 --decode > android_signing_key.jks
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew assembleRelease
    - name: Rename output
      run: |
        cd app/build/outputs/apk/release
        mv app-release.apk PicoZen.apk

    - name: Create Release
      if: github.ref == 'refs/heads/main'
      id: create_release
      uses: actions/create-release@v1 # Using v1 as recommended for release creation
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v1.0.${{ github.run_number }}
        release_name: PicoZen v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
        
    - name: Upload APK to Release
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-release-asset@v1 # Using v1 as recommended for release assets
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./app/build/outputs/apk/release/PicoZen.apk
        asset_name: PicoZen-v1.0.${{ github.run_number }}.apk
        asset_content_type: application/vnd.android.package-archive
